description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: sql-server-free
    name: Free
    type: freemium
    description: Free entry tier for the Microsoft SQL Server APIs API surface. Intended for evaluation,
      prototyping, and low-volume integrations. Real limits and pricing must be reconciled with the provider's
      published plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://management.azure.com
          - http://localhost/reports/api/v2.0
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://management.azure.com
          - http://localhost/reports/api/v2.0
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Community Support
      - name: Sandbox Access
      - name: SQL Server Database Engine API
      - name: SQL Server REST API
      - name: SQL Server Management Objects (SMO)
      - name: SQL Server Reporting Services (SSRS) API
      - name: ODBC Driver for SQL Server
      - name: JDBC Driver for SQL Server
      - name: SQL Server Analysis Services (SSAS) API
      - name: Azure SQL Database REST API
  - id: sql-server-pro
    name: Professional
    type: paid
    description: Production tier for Microsoft SQL Server APIs. Provides higher quotas, priority support,
      and access to the broader API portfolio. Pricing placeholder; align with the provider's pricing
      page.
    entries:
      - label: API Requests
        description: Monthly API request quota
        name: api_requests
        type: quota
        metric: requests
        limit: 100000
        timeFrame: month
        geo: global
        domains:
          - https://management.azure.com
          - http://localhost/reports/api/v2.0
        unit: 1
        price: TBD
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the professional tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 100
        timeFrame: minute
        geo: global
        domains:
          - https://management.azure.com
          - http://localhost/reports/api/v2.0
        unit: 1
        price: '0.00'
        userMultiplied: false
