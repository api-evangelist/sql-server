entries:
- version: SQL Server 2025 (17.x)
  date: '2025-11'
  type: major-release
  breaking: true
  highlights:
  - Native VECTOR data type, vector functions, vector indexes and VECTOR_SEARCH for AI similarity search.
  - AI in the engine — CREATE EXTERNAL MODEL, AI_GENERATE_EMBEDDINGS, AI_GENERATE_CHUNKS against REST inference endpoints.
  - SQL MCP Server and Data API builder REST/GraphQL surfaces for agentic access.
  - Native binary JSON data type plus JSON_OBJECTAGG / JSON_ARRAYAGG.
  - Built-in regular expressions (REGEXP_LIKE, REGEXP_REPLACE, REGEXP_SUBSTR, ...).
  - Change event streaming to Azure Event Hubs (CloudEvents, JSON/Avro).
  - Optimized locking, ZSTD backup compression, TDS 8.0 / TLS 1.3 across features.
  - Discontinued DQS, MDS, Synapse Link, Web edition; new free Standard/Enterprise Developer editions.
- version: SQL Server 2022 (16.x)
  date: '2022-11-16'
  type: major-release
  breaking: true
  highlights:
  - Azure-connected features (managed disaster recovery to Azure SQL Managed Instance).
  - S3-compatible object storage backup/restore and data virtualization (PolyBase).
  - Ledger for SQL Server (tamper-evidence), Query Store on by default, intelligent query processing enhancements.
  - Contained availability groups and multi-write replication.
